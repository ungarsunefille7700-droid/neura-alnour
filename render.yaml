services:
  - type: web
    name: neura-alnour-backend
    runtime: python
    plan: free
    rootDir: backend
    # emergentintegrations n'est PAS sur le PyPI public : il faut l'index Emergent.
    buildCommand: "pip install -r requirements.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/"
    startCommand: "uvicorn server:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      # --- Secrets : valeurs à saisir dans le dashboard Render (jamais dans le fichier) ---
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: STRIPE_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: VIP_ADMIN_1_EMAIL
        sync: false
      - key: VIP_ADMIN_1_PASSWORD
        sync: false
      - key: VIP_ADMIN_2_EMAIL
        sync: false
      - key: VIP_ADMIN_2_PASSWORD
        sync: false
