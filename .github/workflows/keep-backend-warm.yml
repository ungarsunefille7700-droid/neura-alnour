name: Keep backend warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping-health:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping Render health endpoint
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if curl --fail --silent --show-error --max-time 60 \
              https://neura-alnour-backend.onrender.com/api/health; then
              exit 0
            fi
            sleep 10
          done
          exit 1
